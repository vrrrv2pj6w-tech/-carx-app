<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#050505" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="CARX査定" />
<link rel="manifest" href="./manifest.json" />
<title>CARX 高精度写真分析版</title>
<style>
:root{--red:#ff3131;--gold:#ffb000;--muted:#aaa}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:radial-gradient(circle at 20% 0%,rgba(255,49,49,.25),transparent 28%),radial-gradient(circle at 90% 10%,rgba(255,176,0,.18),transparent 25%),linear-gradient(135deg,#050505,#151515 55%,#070707);color:#fff;min-height:100vh}
.app{max-width:560px;margin:auto;padding:18px 18px 56px}
.brand{display:flex;align-items:flex-end;gap:10px;padding-top:18px}.logo{font-size:46px;font-weight:950;letter-spacing:-2px}.x{color:var(--red);text-shadow:0 0 24px rgba(255,49,49,.85)}.kana{color:#ddd;font-weight:800;margin-bottom:10px}
.slash{height:5px;background:linear-gradient(90deg,var(--red),var(--gold));transform:skewX(-34deg);box-shadow:0 0 22px rgba(255,90,20,.55);margin:8px 0 14px}
.catch,.note{color:#cfcfcf;font-size:13px;line-height:1.7}.panel{background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:18px;margin-top:16px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
h2{font-size:18px;margin:0 0 12px}label{display:block;margin-top:13px;color:#ddd;font-size:13px;font-weight:800}
input,select{width:100%;margin-top:7px;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#0d0d0d;color:#fff;font-size:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;border:none;margin-top:18px;padding:16px;border-radius:16px;font-weight:950;color:#fff;font-size:17px;background:linear-gradient(100deg,var(--red),var(--gold));box-shadow:0 12px 32px rgba(255,85,0,.35)}
.secondary{background:#202020;box-shadow:none;border:1px solid rgba(255,255,255,.08)}
.preview{width:100%;height:130px;object-fit:cover;border-radius:18px;margin-top:12px;border:1px solid rgba(255,255,255,.1)}
.pricecard,.market,.ai-box{background:#0c0c0c;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px;margin-top:10px}
.pricecard small{color:var(--muted);font-weight:900}.price{font-size:28px;font-weight:950;margin-top:8px}
.best{margin-top:14px;padding:16px;border-radius:18px;background:linear-gradient(100deg,rgba(255,49,49,.94),rgba(255,176,0,.94));text-align:center;font-weight:950}
.mini{color:#aaa;font-size:12px;line-height:1.5}.range{color:var(--gold);font-weight:950}.fade{animation:fade .35s ease both}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="app">
<header>
<div class="brand"><div class="logo">CAR<span class="x">X</span></div><div class="kana">カーレックス</div></div>
<div class="slash"></div>
<div class="catch">高精度写真分析版。複数写真・車検証・コーションプレート対応。AIが不足写真も指示。</div>
</header>

<section class="panel">
<h2>車両情報</h2>
<label>型式</label><input id="modelCode" placeholder="例：BDG-FP5AJDR">
<label>エンジン型式</label><input id="engine" placeholder="例：6M70">
<div class="grid">
<div><label>車種</label><select id="vehicleType"><option value="small_truck">小型トラック</option><option value="medium_truck">中型トラック</option><option value="heavy_truck">大型トラック</option><option value="tractor_head">トレーラーヘッド</option><option value="dump">ダンプ</option><option value="crane">クレーン付き</option><option value="bus">バス</option><option value="van">バン</option><option value="car">普通車</option></select></div>
<div><label>架装</label><select id="bodyType"><option value="standard">標準</option><option value="flat_body">平ボディ</option><option value="wing">ウイング</option><option value="dump">ダンプ</option><option value="crane">クレーン</option><option value="refrigerated">冷凍・冷蔵</option><option value="tractor">トラクタ</option></select></div>
</div>
<div class="grid">
<div><label>年式</label><input id="year" type="number" placeholder="2008"></div>
<div><label>走行距離km</label><input id="km" type="number" placeholder="800000"></div>
</div>
<div class="grid">
<div><label>ミッション</label><select id="mission"><option>AT</option><option>MT</option></select></div>
<div><label>車重kg</label><input id="weight" type="number" placeholder="8500"></div>
</div>
<div class="grid">
<div><label>燃料</label><select id="fuel"><option value="diesel">ディーゼル</option><option value="gasoline">ガソリン</option><option value="hybrid">ハイブリッド</option></select></div>
<div><label>書類</label><select id="documents"><option value="ok">書類あり</option><option value="missing">書類なし</option><option value="export_ready">輸出抹消OK</option></select></div>
</div>
</section>

<section class="panel">
<h2>写真AI自動判別</h2>
<div class="grid">
<div>
<label>ライブラリ 複数選択OK</label>
<input id="photoLibrary" type="file" accept="image/*" multiple onchange="setPhotoSource('photoLibrary')">
</div>
<div>
<label>カメラ撮影</label>
<input id="photoCamera" type="file" accept="image/*" capture="environment" onchange="setPhotoSource('photoCamera')">
</div>
</div>

<label>写真の種類</label>
<select id="photoSetType">
<option value="mixed">車両全体＋詳細 混合</option>
<option value="exterior">外装中心</option>
<option value="engine_room">エンジンルーム中心</option>
<option value="plate_docs">車検証・コーションプレート中心</option>
<option value="damage">損傷箇所中心</option>
</select>

<div id="previewWrap" class="grid"></div>
<button class="secondary" onclick="analyzePhoto()">📷 車両特化プロAI分析</button>
<button onclick="applyPhotoGuess()">⚡ 分析結果を車両情報へ反映</button>
<div id="aiResult" class="note">複数写真を入れると精度が上がります。おすすめ：前・横・後・メーター・エンジンルーム・コーションプレート。</div>
</section>

<section class="panel">
<button onclick="estimate()">🔥 CARX査定する</button>
<div class="note">API接続先：<b>/.netlify/functions/analyze-photo</b> に自動接続</div>
</section>

<div id="result"></div>
</div>

<script>
let selectedPhotoInputId=null, aiPhotoData=null;

function val(id){return document.getElementById(id).value.trim()}

function setPhotoSource(id){
 selectedPhotoInputId=id;
 previewPhotos();
}

function getFiles(){
 const lib=[...document.getElementById("photoLibrary")?.files||[]];
 const cam=[...document.getElementById("photoCamera")?.files||[]];
 if(selectedPhotoInputId==="photoCamera" && cam.length) return cam;
 if(selectedPhotoInputId==="photoLibrary" && lib.length) return lib;
 return [...lib,...cam];
}

function previewPhotos(){
 const files=getFiles();
 const wrap=document.getElementById("previewWrap");
 wrap.innerHTML="";
 files.slice(0,6).forEach(f=>{
  const img=document.createElement("img");
  img.src=URL.createObjectURL(f);
  img.className="preview";
  wrap.appendChild(img);
 });
}

async function fileToBase64(file){
 return new Promise((resolve,reject)=>{
  const r=new FileReader();
  r.onload=()=>resolve(r.result);
  r.onerror=reject;
  r.readAsDataURL(file);
 });
}

async function filesToBase64(files){
 const limited=files.slice(0,6);
 return Promise.all(limited.map(fileToBase64));
}

async function analyzePhoto(){
 const files=getFiles();
 if(!files.length){alert("写真を選んでください");return}
 document.getElementById("aiResult").innerHTML="高精度AI分析中... 複数写真は少し時間がかかります。";
 try{
  const imagesBase64=await filesToBase64(files);
  const payload={
    imagesBase64,
    photoSetType: val("photoSetType"),
    hints:{
      modelCode: val("modelCode"),
      engine: val("engine"),
      vehicleType: val("vehicleType"),
      bodyType: val("bodyType"),
      year: val("year"),
      km: val("km"),
      weight: val("weight")
    }
  };
  const res=await fetch("/.netlify/functions/analyze-photo",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||"AI分析失敗");
  aiPhotoData=data;
  renderAI(data);
 }catch(e){
  aiPhotoData=fallbackAnalyze(files[0]);
  aiPhotoData.recommendation = "APIエラー: " + (e.message || e);
  aiPhotoData.evidence = ["Netlify Function接続失敗", "URL: /.netlify/functions/analyze-photo"];
  renderAI(aiPhotoData);
 }
}
function fallbackAnalyze(f){
 return{
  analysis_quality:"demo",
  maker_guess:"不明",
  vehicle_type_guess:"small_truck",
  body_type_guess:"standard",
  year_range_guess:"2005-2015",
  model_code_candidates:["型式不明"],
  engine_candidates:["不明"],
  confidence_vehicle:30,
  confidence_year:20,
  confidence_model_code:10,
  confidence_damage:35,
  confidence_overall:25,
  rust:"medium",
  damage:"light",
  damage_locations:["写真AI未接続"],
  engine_visible:false,
  engine_condition_guess:"unknown",
  meter_visible:false,
  odometer_guess:null,
  plate_or_vin_visible:false,
  missing_parts:false,
  frame_damage_suspected:false,
  export_score:68,
  parts_score:65,
  recommended_condition:"engine_ok",
  price_adjustment:20000,
  needed_photos:["前方全体","左右側面","後方","メーター","エンジンルーム","コーションプレート"],
  recommendation:"API未接続またはFunctionエラー。Netlify環境変数OPENAI_API_KEYを入れると高精度分析になります。",
  evidence:["デモ判定"]
 };
}

function renderAI(ai){
 const candidates=(ai.model_code_candidates||[]).join(" / ");
 const engines=(ai.engine_candidates||[]).join(" / ");
 const needed=(ai.needed_photos||[]).join(" / ");
 const evidence=(ai.evidence||[]).map(x=>`・${x}`).join("<br>");
 const warnings=(ai.warning||[]).map(x=>`・${x}`).join("<br>");
 document.getElementById("aiResult").innerHTML=`<div class="ai-box fade">
 <b>日本車・軽・トラック・重機 プロAI分析 v2</b>
 <div class="mini">
 総合信頼度：${ai.confidence_overall||0}% / カテゴリ信頼度：${ai.confidence_category||0}% / 型式信頼度：${ai.confidence_model_code||0}%<br>
 カテゴリ：${ai.main_category||"不明"} / ${ai.vehicle_type_guess||"不明"}<br>
 メーカー：${ai.maker_guess||"不明"} / 車種候補：${ai.vehicle_name_guess||"不明"}<br>
 架装・用途：${ai.body_type_guess||"不明"}<br>
 推定年式：${ai.year_range_guess||"不明"}<br>
 型式候補：${candidates||"不明"}<br>
 エンジン候補：${engines||"不明"}<br>
 メーター：${ai.meter_visible?"あり":"なし"} / 走行距離：${ai.odometer_guess||"不明"} / アワー：${ai.hour_meter_guess||"不明"}<br>
 銘板・プレート：${ai.serial_or_plate_visible?"確認あり":"確認なし"}<br>
 サビ：${ai.rust||"不明"} / 損傷：${ai.damage||"不明"} / 事故修復疑い：${ai.accident_repair_suspected?"あり":"低い"}<br>
 フレーム損傷疑い：${ai.frame_damage_suspected?"あり":"低い"} / 欠品：${ai.missing_parts?"あり":"不明・なし"}<br>
 足回り：${ai.undercarriage_condition||"不明"} / タイヤ・キャタ：${ai.tire_or_track_condition||"不明"}<br>
 輸出：${ai.export_score||0} / 部品：${ai.parts_score||0} / 解体：${ai.scrap_score||0} / 国内再販：${ai.domestic_resale_score||0}<br>
 推奨ルート：${ai.recommended_route||"不明"}
 </div>
 <div class="note"><b>判定根拠</b><br>${evidence||"不明"}</div>
 <div class="note"><b>注意点</b><br>${warnings||"なし"}</div>
 <div class="note"><b>追加すると精度が上がる写真</b><br>${needed||"なし"}</div>
 <div class="note">${ai.recommendation||""}</div>
 </div>`;
}

function applyPhotoGuess(){if(!aiPhotoData){alert("先にAI判別してください");return}setSel("vehicleType",aiPhotoData.vehicle_type_guess);setSel("bodyType",aiPhotoData.body_type_guess);const c=(aiPhotoData.model_code_candidates||[])[0]?.replace("系","");if(c&&c!="型式不明")document.getElementById("modelCode").value=c;const e=(aiPhotoData.engine_candidates||[])[0];if(e&&e!="不明")document.getElementById("engine").value=e;const y=String(aiPhotoData.year_range_guess||"").match(/(19|20)\d{2}/);if(y)document.getElementById("year").value=y[0];
if(aiPhotoData.odometer_guess && !document.getElementById("km").value) document.getElementById("km").value=aiPhotoData.odometer_guess;
alert("反映しました。必要なら修正してください。")}
function setSel(id,v){const el=document.getElementById(id);if(el&&Array.from(el.options).some(o=>o.value==v))el.value=v}

const engines={"6M70":260000,"6HK1":230000,"J08E":210000,"6M60":190000,"4HK1":155000,"4M50":150000,"J05D":120000,"N04C":105000};
const vehicleBase={small_truck:90000,medium_truck:160000,heavy_truck:280000,tractor_head:380000,dump:240000,crane:280000,bus:230000,van:70000,car:50000};
const bodyBonus={standard:0,flat_body:30000,wing:70000,dump:120000,crane:180000,refrigerated:90000,tractor:160000};
const markets=[["アフリカ",1.25,100000],["中東",1.18,80000],["東南アジア",1.10,60000],["オセアニア",1.08,40000],["国内部品輸出",.95,30000]];
function estimate(){
 const p={modelCode:val("modelCode").toUpperCase(),engine:val("engine").toUpperCase(),vehicleType:val("vehicleType"),bodyType:val("bodyType"),fuel:val("fuel"),year:Number(val("year")||0),km:Number(val("km")||0),mission:val("mission"),weight:Number(val("weight")||1200),documents:val("documents"),ai:aiPhotoData};
 const e=Object.keys(engines).find(k=>p.engine.includes(k)); const engine=engines[e]||70000;
 let scrap=Math.floor(p.weight*35*.64)+(p.fuel=="diesel"?25000:0);
 let parts=Math.floor(engine*.78)+40000+Math.floor((bodyBonus[p.bodyType]||0)*.55)+(p.mission=="MT"?45000:0);
 if(p.ai?.parts_score>=75) parts+=40000; if(p.documents=="missing") parts-=30000;
 let results=markets.map(m=>{let price=(vehicleBase[p.vehicleType]||90000)+engine+(bodyBonus[p.bodyType]||0)+m[2];let mult=m[1];if(p.fuel=="diesel"){price+=60000;mult*=1.10}if(p.mission=="MT"){price+=50000;mult*=1.08}if(p.km>900000)mult*=.86;else if(p.km&&p.km<200000)mult*=1.10;if(p.documents=="missing")mult*=.70;if(p.documents=="export_ready")mult*=1.04;if(p.ai){if(p.ai.damage=="heavy")mult*=.72;if(p.ai.damage=="medium")mult*=.90;if(p.ai.rust=="heavy")mult*=.85;if(p.ai.frame_damage_suspected)mult*=.82;if(p.ai.engine_visible)price+=50000;if(p.ai.export_score>=80)price+=90000;if(p.ai.confidence_overall>=80)mult*=1.03;if(p.ai.price_adjustment)price+=Number(p.ai.price_adjustment)}return{market:m[0],price:Math.max(0,Math.floor(price*mult))}}).sort((a,b)=>b.price-a.price);
 const exp=results[0].price; const prices={scrap,parts,export:exp}; const best=Object.entries(prices).sort((a,b)=>b[1]-a[1])[0];
 document.getElementById("result").innerHTML=`<div class="panel fade"><h2>査定結果</h2>${Object.entries(prices).map(([k,v])=>`<div class="pricecard"><small>${label(k)}</small><div class="price">${yen(v)}</div></div>`).join("")}<div class="best">🔥 最適：${label(best[0])} ${yen(best[1])}</div><div class="note">輸出レンジ：${yen(Math.floor(exp*.84))}〜${yen(Math.floor(exp*1.18))}<br>最有力市場：${results[0].market}</div><h2 style="margin-top:18px">国別ランキング</h2>${results.slice(0,3).map((r,i)=>`<div class="market"><b>${i+1}. ${r.market}</b> <span class="range">${yen(r.price)}</span></div>`).join("")}</div>`;
}
function label(k){return{scrap:"💰 スクラップ",parts:"🔧 部品取り",export:"🚢 輸出"}[k]||k}
function yen(n){return Number(n||0).toLocaleString("ja-JP")+"円"}
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"))}
</script>
</body>
</html>
